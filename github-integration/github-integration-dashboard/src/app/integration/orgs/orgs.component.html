<div class="orgs-container">
  <!-- Loader -->
  <mat-progress-spinner *ngIf="loading" mode="indeterminate" diameter="40"></mat-progress-spinner>

  <!-- No data message -->
  <div *ngIf="rowData.length === 0" class="no-data" >
    No organizations found.
  </div>

  <!-- Grid -->
  <ag-grid-angular
    *ngIf="!loading && rowData.length > 0"
    class="ag-theme-alpine"
    style="width: 100%;"
    [rowData]="rowData"
    [columnDefs]="colDefs"
    [gridOptions]="gridOptions">
  </ag-grid-angular>
</div>
